<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tamarac 2D Polygon + 3D Buildings</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet"/>
<style>
  body { margin:0; padding:0; font-family: Arial,sans-serif; }
  #header {
    position:fixed; top:0; left:0; width:100%; height:60px;
    background-color:#007ea8; display:flex; align-items:center;
    padding:0 20px; box-shadow:0 2px 6px rgba(0,0,0,0.15); z-index:10;
  }
  #header img { height:40px; margin-right:15px; }
  #header h1 { color:#fff; font-size:20px; margin:0; }
  #map { position:absolute; top:60px; bottom:0; width:100%; }
  #basemap-controls {
    position:absolute; top:70px; right:10px; z-index:15;
    background: rgba(255,255,255,0.9); padding:5px 10px; border-radius:4px;
  }
  #basemap-controls select { font-size:14px; }
  .mapboxgl-popup-content { font-size:14px; padding:10px; border-radius:6px; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.3);}
  .mapboxgl-popup-content strong { color:#e63946; font-size:15px; }
</style>
</head>
<body>

<div id="header">
  <img src="https://www.tamarac.gov/ImageRepository/Document?documentID=7127" alt="Tamarac Logo">
  <h1>Tamarac City Boundaries</h1>
</div>

<div id="map"></div>

<div id="basemap-controls">
  <label for="basemap">Basemap:</label>
  <select id="basemap">
    <option value="mapbox://styles/mapbox/streets-v12" selected>Streets</option>
    <option value="mapbox://styles/mapbox/satellite-streets-v12">Satellite</option>
    <option value="mapbox://styles/mapbox/light-v11">Light</option>
    <option value="mapbox://styles/mapbox/dark-v11">Dark</option>
  </select>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiamFudG9ub2ZmIiwiYSI6ImNtbWNobmt3aDAycmczMXB1Y2pjZ3FnMHcifQ.b2d4BLzSWRZN1VpcEBuIeQ';

const geojsonURL = 'https://raw.githubusercontent.com/jantonoff/City-of-Tamarac/main/city_boundary.geojson';
let targetOpacity = 0, currentOpacity = 0, hoverActive = false, pulseTime = 0;

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/streets-v12',
  pitch:45,
  bearing:-17.6,
  antialias:true
});

// Controls
map.addControl(new mapboxgl.NavigationControl(), 'top-left');
map.addControl(new mapboxgl.GeolocateControl({
  positionOptions:{enableHighAccuracy:true},
  trackUserLocation:true,
  showUserHeading:true
}), 'top-left');

// Add city polygon and hover
map.on('load', async () => {

  // 1️⃣ Add city polygon source
  map.addSource('city-boundary', { type:'geojson', data: geojsonURL });

  // 2️⃣ Add 2D fill polygon
  map.addLayer({
    id:'city-layer',
    type:'fill',
    source:'city-boundary',
    paint:{'fill-color':'#e63946','fill-opacity':0.5}
  });

  // 3️⃣ Hover fill and outline
  map.addLayer({
    id:'city-layer-hover-fill',
    type:'fill',
    source:'city-boundary',
    paint:{'fill-color':'#f1faee','fill-opacity':0},
    filter:['==','cityname','']
  });
  map.addLayer({
    id:'city-layer-hover-outline',
    type:'line',
    source:'city-boundary',
    paint:{'line-color':'#f1faee','line-width':3,'line-opacity':1},
    filter:['==','cityname','']
  });

  // 4️⃣ Fit map to city polygon
  const response = await fetch(geojsonURL);
  const data = await response.json();
  const coords = data.features.flatMap(f=>f.geometry.coordinates.flat(2));
  const lats = coords.filter((_,i)=>i%2===1);
  const lngs = coords.filter((_,i)=>i%2===0);
  const sw = [Math.min(...lngs), Math.min(...lats)];
  const ne = [Math.max(...lngs), Math.max(...lats)];
  map.fitBounds([sw,ne], {padding:40});

  // 5️⃣ Add Mapbox default 3D buildings (extrusions)
  const layers = map.getStyle().layers;
  const labelLayerId = layers.find(l => l.type === 'symbol')?.id;
  if(labelLayerId){
    map.addLayer({
      'id':'3d-buildings',
      'source':'composite',
      'source-layer':'building',
      'filter':['==','extrude','true'],
      'type':'fill-extrusion',
      'minzoom':15,
      'paint':{
        'fill-extrusion-color':'#aaa',
        'fill-extrusion-height':['get','height'],
        'fill-extrusion-base':['get','min_height'],
        'fill-extrusion-opacity':0.6
      }
    }, labelLayerId);
  }
});

// Popups
map.on('click','city-layer', e=>{
  const cityName=e.features[0].properties.cityname || 'N/A';
  new mapboxgl.Popup().setLngLat(e.lngLat).setHTML(`<strong>City Name:</strong> ${cityName}`).addTo(map);
});

// Hover
map.on('mouseenter','city-layer',()=>map.getCanvas().style.cursor='pointer');
map.on('mouseleave','city-layer',()=>map.getCanvas().style.cursor='');
map.on('mousemove','city-layer', e=>{
  if(e.features.length>0){
    const cityName = e.features[0].properties.cityname;
    ['city-layer-hover-fill','city-layer-hover-outline'].forEach(l => map.setFilter(l,['==','cityname',cityName]));
    targetOpacity = 0.3; hoverActive = true;
  }
});
map.on('mouseleave','city-layer', ()=>{
  ['city-layer-hover-fill','city-layer-hover-outline'].forEach(l => map.setFilter(l,['==','cityname','']));
  targetOpacity = 0; hoverActive = false;
});

// Animate hover
function animate(){
  currentOpacity += (targetOpacity - currentOpacity)*0.1;
  map.setPaintProperty('city-layer-hover-fill','fill-opacity',currentOpacity);
  requestAnimationFrame(animate);
}
animate();

// Basemap switcher
document.getElementById('basemap').addEventListener('change', function(){
  map.setStyle(this.value);
  map.once('style.load', () => {
    map.addSource('city-boundary', {type:'geojson', data:geojsonURL});
    map.addLayer({
      id:'city-layer',
      type:'fill',
      source:'city-boundary',
      paint:{'fill-color':'#e63946','fill-opacity':0.5}
    });
    map.addLayer({
      id:'city-layer-hover-fill',
      type:'fill',
      source:'city-boundary',
      paint:{'fill-color':'#f1faee','fill-opacity':0},
      filter:['==','cityname','']
    });
    map.addLayer({
      id:'city-layer-hover-outline',
      type:'line',
      source:'city-boundary',
      paint:{'line-color':'#f1faee','line-width':3,'line-opacity':1},
      filter:['==','cityname','']
    });
  });
});
</script>
</body>
</html>
