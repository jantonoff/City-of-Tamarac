<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tamarac Interactive Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.css" rel="stylesheet">

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js"></script>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* SEARCH + ZOOM CONTAINER */

#controls{
position:absolute;
top:10px;
left:10px;
display:flex;
flex-direction:column;
gap:6px;
z-index:1;
}

/* BASEMAP BUTTON */

#basemap-btn{
background:white;
border-radius:6px;
border:none;
width:34px;
height:34px;
font-size:16px;
cursor:pointer;
box-shadow:0 0 4px rgba(0,0,0,.2);
}

/* BASEMAP MENU */

#basemap-menu{
position:absolute;
top:50px;
left:10px;
background:white;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,.3);
display:none;
overflow:hidden;
}

#basemap-menu button{
display:block;
width:120px;
padding:8px;
border:none;
background:white;
cursor:pointer;
text-align:left;
}

#basemap-menu button:hover{
background:#eee;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="controls"></div>

<button id="basemap-btn">🗺</button>

<div id="basemap-menu">
<button data-style="mapbox://styles/mapbox/streets-v12">Streets</button>
<button data-style="mapbox://styles/mapbox/light-v11">Light</button>
<button data-style="mapbox://styles/mapbox/satellite-streets-v12">Satellite</button>
<button data-style="mapbox://styles/mapbox/outdoors-v12">Outdoors</button>
</div>

<script>

mapboxgl.accessToken = 'pk.eyJ1IjoiamFudG9ub2ZmIiwiYSI6ImNtbWRwYTZkNzA1ajAycnB4YTc5NW01MTEifQ.IjJ-GvsLrmiP3OUq_e4DyQ';


const map = new mapboxgl.Map({
container:'map',
style:'mapbox://styles/mapbox/streets-v12',
center:[-80.2498,26.2129],
zoom:15,
pitch:60,
bearing:-10,
antialias:true
});


/* ZOOM CONTROLS */

map.addControl(new mapboxgl.NavigationControl(),'top-left');


/* SEARCH BAR */

const geocoder = new MapboxGeocoder({
accessToken:mapboxgl.accessToken,
mapboxgl:mapboxgl,
placeholder:"Search address"
});

map.addControl(geocoder,'top-left');


/* ADD TERRAIN + BUILDINGS */

map.on('load', () => {

map.addSource('mapbox-dem',{
'type':'raster-dem',
'url':'mapbox://mapbox.mapbox-terrain-dem-v1',
'tileSize':512,
'maxzoom':14
});

map.setTerrain({
'source':'mapbox-dem',
'exaggeration':1.2
});

add3DBuildings();

});


function add3DBuildings(){

const layers = map.getStyle().layers;

let labelLayerId;

for (const layer of layers) {
if (layer.type === 'symbol' && layer.layout['text-field']) {
labelLayerId = layer.id;
break;
}
}

map.addLayer({
'id':'3d-buildings',
'source':'composite',
'source-layer':'building',
'filter':['==','extrude','true'],
'type':'fill-extrusion',
'minzoom':15,
'paint':{
'fill-extrusion-color':'#aaa',
'fill-extrusion-height':['get','height'],
'fill-extrusion-base':['get','min_height'],
'fill-extrusion-opacity':0.6
}
},labelLayerId);

}


/* BASEMAP SWITCHER */

const basemapBtn = document.getElementById("basemap-btn");
const basemapMenu = document.getElementById("basemap-menu");

basemapBtn.onclick = () => {

basemapMenu.style.display =
basemapMenu.style.display === "block"
? "none"
: "block";

};


document.querySelectorAll("#basemap-menu button").forEach(button => {

button.onclick = () => {

const style = button.dataset.style;

map.setStyle(style);

basemapMenu.style.display = "none";

map.once('style.load', () => {

map.addSource('mapbox-dem',{
'type':'raster-dem',
'url':'mapbox://mapbox.mapbox-terrain-dem-v1',
'tileSize':512,
'maxzoom':14
});

map.setTerrain({
'source':'mapbox-dem',
'exaggeration':1.2
});

add3DBuildings();

});

};

});

</script>

</body>
</html>
