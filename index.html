<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tamarac Interactive Map</title>

<!-- Mapbox GL JS v2.15 -->
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>
<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.css" rel="stylesheet"/>

<style>
body { margin:0; padding:0; font-family:Arial,sans-serif; }

/* Header */
#header {
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  background:#007ea8;
  color:white;
  display:flex;
  align-items:center;
  padding:0 20px;
  z-index:10;
}
#header img { height:40px; margin-right:15px; }

#map { position:absolute; top:60px; bottom:0; width:100%; }

/* Legend */
#legend {
  position:absolute;
  top:80px;
  right:15px;
  background:rgba(255,255,255,0.95);
  padding:12px;
  border-radius:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.25);
  z-index:20;
  font-size:14px;
}
.legend-color {
  display:inline-block;
  width:14px;
  height:14px;
  background:#e63946;
  margin-right:6px;
  border-radius:3px;
}

/* Top-left controls container */
.controls-container {
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:4px;
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
}

/* Basemap Button (bottom right) */
#basemap-button-container {
  position: absolute;
  bottom:50px; /* above Mapbox credits */
  right:15px;
  z-index:15;
}
#basemap-button {
  width:80px;
  height:80px;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  border:2px solid #007ea8;
  background-size: cover;
  background-position: center;
  box-shadow:0 4px 10px rgba(0,0,0,0.35);
  position: relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
#basemap-button::after {
  content: "▼";
  position:absolute;
  bottom:8px;
  right:8px;
  font-size:18px;
  font-weight:bold;
  color:white;
  text-shadow:0 0 3px rgba(0,0,0,0.8);
  transition: transform 0.25s ease;
}
#basemap-button.open::after { transform: rotate(180deg); }

/* Dropdown */
#basemap-dropdown {
  display:none;
  position:absolute;
  bottom:90px;
  right:0;
  flex-direction:row;
  flex-wrap:wrap;
  gap:6px;
  max-width: calc(100vw - 30px);
  background:#fff;
  padding:6px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  opacity:0;
  transform:translateY(10px);
  transition: opacity 0.25s ease, transform 0.25s ease;
}
#basemap-dropdown.show { opacity:1; transform:translateY(0); }

/* Basemap Cards */
.basemap-card-small {
  width:90px;
  height:55px;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  border:2px solid transparent;
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}
.basemap-card-small:hover {
  transform: scale(1.05);
  border-color:#007ea8;
  box-shadow:0 6px 15px rgba(0,0,0,0.35);
}
.basemap-card-small.active {
  border:3px solid #007ea8;
  box-shadow:0 6px 15px rgba(0,0,0,0.4);
  transform: scale(1.05);
}
.basemap-label-small {
  position:absolute;
  bottom:4px;
  left:6px;
  color:white;
  font-size:11px;
  font-weight:bold;
  text-shadow:0 1px 3px rgba(0,0,0,0.8);
}
</style>
</head>

<body>
<div id="header">
  <img src="https://www.tamarac.gov/ImageRepository/Document?documentID=7127">
  <h2>Tamarac Interactive Map</h2>
</div>

<div id="map"></div>

<div id="legend">
  <strong>Legend</strong><br>
  <span class="legend-color"></span> Tamarac City Boundary
</div>

<!-- Basemap Switcher -->
<div id="basemap-button-container">
  <div id="basemap-button"></div>
  <div id="basemap-dropdown">
    <div class="basemap-card-small active" data-style="mapbox://styles/mapbox/streets-v12" style="background:url('https://api.mapbox.com/styles/v1/mapbox/streets-v12/static/-80.25,26.22,11/300x150?access_token=pk.eyJ1IjoiamFudG9ub2ZmIiwiYSI6ImNtbWRsc3A1aTAwbjcycm4zaGdxem54aHAifQ.Uorza4r01TewxyZ2jCJgiQ') center/cover;"><div class="basemap-label-small">Streets</div></div>
    <div class="basemap-card-small" data-style="mapbox://styles/mapbox/satellite-streets-v12" style="background:url('https://api.mapbox.com/styles/v1/mapbox/satellite-streets-v12/static/-80.25,26.22,11/300x150?access_token=pk.eyJ1IjoiamFudG9ub2ZmIiwiYSI6ImNtbWRsc3A1aTAwbjcycm4zaGdxem54aHAifQ.Uorza4r01TewxyZ2jCJgiQ') center/cover;"><div class="basemap-label-small">Satellite</div></div>
    <div class="basemap-card-small" data-style="mapbox://styles/mapbox/light-v11" style="background:url('https://api.mapbox.com/styles/v1/mapbox/light-v11/static/-80.25,26.22,11/300x150?access_token=pk.eyJ1IjoiamFudG9ub2ZmIiwiYSI6ImNtbWRsc3A1aTAwbjcycm4zaGdxem54aHAifQ.Uorza4r01TewxyZ2jCJgiQ') center/cover;"><div class="basemap-label-small">Light</div></div>
    <div class="basemap-card-small" data-style="mapbox://styles/mapbox/dark-v11" style="background:url('https://api.mapbox.com/styles/v1/mapbox/dark-v11/static/-80.25,26.22,11/300x150?access_token=pk.eyJ1IjoiamFudG9ub2ZmIiwiYSI6ImNtbWRsc3A1aTAwbjcycm4zaGdxem54aHAifQ.Uorza4r01TewxyZ2jCJgiQ') center/cover;"><div class="basemap-label-small">Dark</div></div>
  </div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js"></script>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiamFudG9ub2ZmIiwiYSI6ImNtbWRsc3A1aTAwbjcycm4zaGdxem54aHAifQ.Uorza4r01TewxyZ2jCJgiQ';
const geojsonURL = 'https://raw.githubusercontent.com/jantonoff/City-of-Tamarac/main/city_boundary.geojson';

const map = new mapboxgl.Map({
  container:'map',
  style:'mapbox://styles/mapbox/streets-v12',
  antialias:true
});

// Top-left controls
const controlsContainer = document.createElement('div');
controlsContainer.className='controls-container';
const navControl = new mapboxgl.NavigationControl();
controlsContainer.appendChild(navControl.onAdd(map));
const geocoder = new MapboxGeocoder({accessToken:mapboxgl.accessToken,mapboxgl:mapboxgl,placeholder:'Search Tamarac...'});
controlsContainer.appendChild(geocoder.onAdd(map));
map.getContainer().appendChild(controlsContainer);

// Add city boundary + 3D buildings
function addCityLayer() {
  if(map.getSource('city')) return;
  map.addSource('city',{ type:'geojson', data:geojsonURL });
  map.addLayer({ id:'city-fill', type:'fill', source:'city', paint:{ 'fill-color':'#e63946','fill-opacity':0.5 } });
  map.addLayer({ id:'city-outline', type:'line', source:'city', paint:{ 'line-color':'#ffffff','line-width':3 } });
  const layers = map.getStyle().layers;
  const labelLayerId = layers.find(l=>l.type==='symbol' && l.layout?.['text-field'])?.id;
  map.addLayer({ id:'3d-buildings', source:'composite', 'source-layer':'building', filter:['==','extrude','true'], type:'fill-extrusion', minzoom:15, paint:{ 'fill-extrusion-color':'#aaa', 'fill-extrusion-height':['get','height'], 'fill-extrusion-base':['get','min_height'], 'fill-extrusion-opacity':0.6 }}, labelLayerId || undefined);
}

// Load map & fit bounds
map.on('load', async ()=>{
  addCityLayer();
  try{
    const response = await fetch(geojsonURL);
    const data = await response.json();
    const bounds = new mapboxgl.LngLatBounds();
    data.features.forEach(feature=>{
      const geom = feature.geometry;
      if(geom.type==="Polygon") geom.coordinates[0].forEach(coord=>bounds.extend(coord));
      if(geom.type==="MultiPolygon") geom.coordinates.forEach(polygon=>polygon[0].forEach(coord=>bounds.extend(coord)));
    });
    map.fitBounds(bounds,{ padding:60, pitch:10, bearing:0, duration:1500 });
    setTimeout(()=>{ map.easeTo({ pitch:30, bearing:0, duration:2000 }); },1600);
  }catch(err){ console.error("GeoJSON failed to load:",err);}
  // Initialize basemap button preview
  const activeCard = document.querySelector('.basemap-card-small.active');
  if(activeCard) document.getElementById('basemap-button').style.backgroundImage = activeCard.style.backgroundImage;
});

// ------------------
// Basemap Switcher Logic
// ------------------
const basemapButton = document.getElementById('basemap-button');
const basemapDropdown = document.getElementById('basemap-dropdown');

// Toggle dropdown
basemapButton.addEventListener('click', e=>{
  e.stopPropagation();
  const isOpen = basemapDropdown.classList.contains('show');
  if(isOpen){
    basemapDropdown.classList.remove('show');
    basemapButton.classList.remove('open');
    setTimeout(()=>{ basemapDropdown.style.display='none'; }, 250);
  }else{
    basemapDropdown.style.display='flex';
    setTimeout(()=>{ basemapDropdown.classList.add('show'); }, 10);
    basemapButton.classList.add('open');
  }
});

// Select basemap
document.querySelectorAll('.basemap-card-small').forEach(card=>{
  card.addEventListener('click', e=>{
    e.stopPropagation();
    document.querySelectorAll('.basemap-card-small').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
    map.setStyle(card.dataset.style);
    map.once('style.load', addCityLayer);
    basemapButton.style.backgroundImage = card.style.backgroundImage;
    basemapDropdown.classList.remove('show');
    basemapButton.classList.remove('open');
    setTimeout(()=>{ basemapDropdown.style.display='none'; }, 250);
  });
});

// Close dropdown clicking outside
document.addEventListener('click', e=>{
  if(!basemapButton.contains(e.target) && !basemapDropdown.contains(e.target)){
    if(basemapDropdown.classList.contains('show')){
      basemapDropdown.classList.remove('show');
      basemapButton.classList.remove('open');
      setTimeout(()=>{ basemapDropdown.style.display='none'; }, 250);
    }
  }
});

// Responsive
window.addEventListener('resize', ()=>{
  if(basemapDropdown.style.display==='flex'){
    basemapDropdown.style.maxWidth = `${window.innerWidth-30}px`;
  }
});
</script>

</body>
</html>
